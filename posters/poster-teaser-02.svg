<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none" role="img" aria-label="Zelcodes — Tuned for SwiftUI">
  <defs>
    <!-- Void mesh -->
    <radialGradient id="bg-indigo" cx=".5" cy=".5" r=".35">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-pink" cx=".82" cy=".3" r=".35">
      <stop offset="0" stop-color="#ec4899" stop-opacity=".32"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-sky" cx=".18" cy=".72" r=".35">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx=".5" cy=".5" r=".75">
      <stop offset=".6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".55"/>
    </radialGradient>

    <!-- Big orb defs -->
    <clipPath id="orb-clip"><circle cx="540" cy="420" r="180"/></clipPath>
    <filter id="orb-blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="orb-halo" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="64"/></filter>
    <radialGradient id="orb-sheen" cx=".3" cy=".22" r=".72">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".65"/>
      <stop offset=".35" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orb-rim" x1="360" y1="240" x2="720" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".6"/>
    </linearGradient>
    <radialGradient id="orb-inner" cx=".5" cy=".5" r=".5">
      <stop offset=".75" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".5"/>
    </radialGradient>
    <radialGradient id="photon" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".6" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </radialGradient>

    <!-- Swift bird gradient + glow -->
    <linearGradient id="swift-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDA47A"/>
      <stop offset=".4" stop-color="#F05138"/>
      <stop offset="1" stop-color="#B33524"/>
    </linearGradient>
    <filter id="bird-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Headline gradient — same muted teaser palette -->
    <linearGradient id="headline-grad" x1="100" y1="760" x2="980" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset=".4" stop-color="#f472b6"/>
      <stop offset=".75" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#f5f1e8"/>
    </linearGradient>
    <linearGradient id="headline-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".4"/>
      <stop offset=".4" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Watermark orb defs -->
    <clipPath id="w-clip"><circle cx="36" cy="36" r="26"/></clipPath>
    <linearGradient id="w-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity=".1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="warm-lockup" x1="455" y1="1020" x2="625" y2="1048" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".45" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f5f1e8"/>
    </linearGradient>
  </defs>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Background + starfield                 │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-background">
    <rect width="1080" height="1080" fill="#03040a"/>
    <rect width="1080" height="1080" fill="url(#bg-indigo)"/>
    <rect width="1080" height="1080" fill="url(#bg-pink)"/>
    <rect width="1080" height="1080" fill="url(#bg-sky)"/>
    <rect width="1080" height="1080" fill="url(#vignette)"/>
  </g>

  <g id="layer-starfield" fill="#ffffff">
    <g opacity=".85">
      <circle cx="110" cy="180" r="2.2"/><circle cx="110" cy="180" r="7" opacity=".15"/>
      <circle cx="970" cy="120" r="2.6"/><circle cx="970" cy="120" r="8" opacity=".15"/>
      <circle cx="900" cy="260" r="1.8"/><circle cx="900" cy="260" r="5" opacity=".12"/>
      <circle cx="180" cy="320" r="1.5"/><circle cx="180" cy="320" r="4" opacity=".1"/>
      <circle cx="940" cy="460" r="2"/><circle cx="940" cy="460" r="6" opacity=".12"/>
      <circle cx="90" cy="540" r="1.6"/><circle cx="90" cy="540" r="5" opacity=".12"/>
      <circle cx="1000" cy="610" r="1.8"/><circle cx="1000" cy="610" r="5" opacity=".12"/>
    </g>
    <g opacity=".5">
      <circle cx="240" cy="110" r=".8"/><circle cx="440" cy="90" r="1"/>
      <circle cx="630" cy="150" r=".8"/><circle cx="740" cy="100" r="1.2"/>
      <circle cx="350" cy="240" r=".8"/><circle cx="820" cy="350" r="1"/>
      <circle cx="220" cy="480" r=".8"/><circle cx="990" cy="760" r="1"/>
      <circle cx="100" cy="740" r="1.2"/><circle cx="60" cy="420" r=".8"/>
      <circle cx="1030" cy="340" r=".9"/><circle cx="780" cy="600" r="1"/>
      <circle cx="290" cy="600" r=".9"/><circle cx="870" cy="680" r=".8"/>
    </g>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Transmission pill — adds · SWIFTUI     │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-transmission">
    <rect x="370" y="56" width="340" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <circle cx="394" cy="77" r="4" fill="#F05138"/>
    <circle cx="394" cy="77" r="10" fill="#F05138" opacity=".3"/>
    <text x="414" y="83" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="3" fill="#f5f1e8">TRANSMISSION · 02 · SWIFTUI</text>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Hero orb — slightly smaller, offset    │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-hero-orb">
    <g filter="url(#orb-halo)" opacity=".55">
      <circle cx="450" cy="380" r="120" fill="#6366f1"/>
      <circle cx="630" cy="380" r="120" fill="#ec4899"/>
      <circle cx="540" cy="520" r="120" fill="#38bdf8"/>
    </g>

    <!-- Wide ambient orbit (behind orb) -->
    <ellipse cx="540" cy="420" rx="360" ry="145" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 10" transform="rotate(-30 540 420)"/>

    <!-- Orb -->
    <circle cx="540" cy="420" r="180" fill="#0b0b14"/>
    <g clip-path="url(#orb-clip)">
      <g filter="url(#orb-blur)">
        <circle cx="460" cy="360" r="116" fill="#6366f1"/>
        <circle cx="624" cy="400" r="112" fill="#ec4899"/>
        <circle cx="520" cy="530" r="116" fill="#38bdf8"/>
      </g>
      <circle cx="540" cy="420" r="180" fill="url(#orb-inner)"/>
    </g>
    <circle cx="540" cy="420" r="180" fill="url(#orb-sheen)"/>
    <circle cx="540" cy="420" r="180" fill="none" stroke="url(#orb-rim)" stroke-width="3"/>
    <ellipse cx="464" cy="336" rx="46" ry="18" fill="#ffffff" opacity=".4" transform="rotate(-30 464 336)"/>

    <!-- Inner tilted orbit (photon's orbit) -->
    <ellipse cx="540" cy="420" rx="224" ry="92" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="2" stroke-dasharray="3 6" transform="rotate(-30 540 420)"/>

    <!-- Photon on inner orbit -->
    <g transform="translate(540 420) rotate(-30) scale(1 0.411)">
      <g transform="rotate(225)">
        <circle cx="0" cy="-224" r="40" fill="#ffffff" opacity=".2"/>
        <circle cx="0" cy="-224" r="18" fill="url(#photon)"/>
        <circle cx="0" cy="-224" r="7" fill="#ffffff"/>
      </g>
    </g>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Swift bird — flying around the orb     │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-swift">
    <!-- Trail leading from the orb to the bird -->
    <path d="M 640 300 C 700 260, 740 220, 790 190"
          stroke="#F05138" stroke-opacity=".45" stroke-width="2"
          stroke-dasharray="4 8" fill="none" stroke-linecap="round"/>

    <!-- Swift bird silhouette @ (800, 160), scaled 1.3× so visible total ~120 wide -->
    <g transform="translate(800 160) scale(1.3)" filter="url(#bird-glow)">
      <path d="M 4 55
               C -8 45, -2 20, 16 12
               C 36 2, 60 4, 78 16
               L 74 18
               L 92 28
               L 82 28
               C 86 42, 70 54, 46 58
               C 28 60, 14 58, 4 55 Z"
            fill="url(#swift-grad)"/>
      <!-- Subtle wing highlight -->
      <path d="M 10 40 C 18 30, 32 22, 52 18"
            stroke="#ffffff" stroke-opacity=".32" stroke-width="1.6"
            fill="none" stroke-linecap="round"/>
      <!-- Tiny eye -->
      <circle cx="68" cy="22" r="1.6" fill="#7c2d12"/>
    </g>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Cryptic headline — SwiftUI highlighted │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-headline">
    <!-- Line 1: "Tuned for" — gradient fill -->
    <text x="540" y="810" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="78" font-weight="800" letter-spacing="-3.8" fill="url(#headline-grad)">Tuned for</text>
    <!-- Line 2: "SwiftUI." — orange to echo the bird -->
    <text x="540" y="894" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="78" font-weight="800" letter-spacing="-3.8" fill="url(#swift-grad)">SwiftUI.</text>
    <!-- Glass sheen overlays on both lines -->
    <text x="540" y="810" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="78" font-weight="800" letter-spacing="-3.8" fill="url(#headline-sheen)">Tuned for</text>
    <text x="540" y="894" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="78" font-weight="800" letter-spacing="-3.8" fill="url(#headline-sheen)">SwiftUI.</text>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Sub-tease                              │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-subtease">
    <text x="540" y="952" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" letter-spacing=".4" fill="#9aa0b8">Watch your orbit.</text>
  </g>

  <!-- ┌────────────────────────────────────────┐ -->
  <!-- │  Brand watermark — warm lockup          │ -->
  <!-- └────────────────────────────────────────┘ -->
  <g id="layer-watermark" opacity=".95">
    <text x="525" y="1040" text-anchor="end" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" letter-spacing="-1.5" fill="url(#warm-lockup)">zelc</text>
    <g transform="translate(524 1014) scale(0.444)">
      <circle cx="36" cy="36" r="26" fill="#0b0b14"/>
      <g clip-path="url(#w-clip)">
        <circle cx="24" cy="24" r="20" fill="#6366f1" opacity=".78"/>
        <circle cx="48" cy="28" r="20" fill="#ec4899" opacity=".78"/>
        <circle cx="32" cy="52" r="20" fill="#38bdf8" opacity=".78"/>
        <circle cx="36" cy="36" r="26" fill="url(#orb-inner)"/>
      </g>
      <circle cx="36" cy="36" r="26" fill="url(#orb-sheen)"/>
      <circle cx="36" cy="36" r="26" fill="none" stroke="url(#w-rim)" stroke-width="2.2"/>
      <ellipse cx="27" cy="22" rx="6" ry="3" fill="#ffffff" opacity=".45" transform="rotate(-30 27 22)"/>
    </g>
    <text x="555" y="1040" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" letter-spacing="-1.5" fill="url(#warm-lockup)">des</text>
  </g>
</svg>
