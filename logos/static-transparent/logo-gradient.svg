<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none" role="img" aria-label="Zelcodes">
  <defs>
    <!-- Continuous diagonal brand gradient across the whole viewBox -->
    <linearGradient id="text" x1="0" y1="0" x2="400" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".32" stop-color="#ec4899"/>
      <stop offset=".7" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f5f1e8"/>
    </linearGradient>

    <!-- Orb defs (72-unit frame) -->
    <clipPath id="oc"><circle cx="36" cy="36" r="26"/></clipPath>
    <filter id="ob" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="oh" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
    <radialGradient id="os" cx=".3" cy=".22" r=".72">
      <stop offset="0" stop-color="#fff" stop-opacity=".65"/>
      <stop offset=".35" stop-color="#fff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orim" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#fff" stop-opacity=".1"/>
      <stop offset="1" stop-color="#fff" stop-opacity=".6"/>
    </linearGradient>
    <radialGradient id="oin" cx=".5" cy=".5" r=".5">
      <stop offset=".75" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".45"/>
    </radialGradient>
    <radialGradient id="op" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".6" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </radialGradient>
  </defs>

  <!-- "zelc" — ends at x=168 -->
  <text x="168" y="70" text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="60" font-weight="800" letter-spacing="-3.2" fill="url(#text)">zelc</text>

  <!-- Orb — centered at (200, 50), display size 52×52 (72 * 0.722) -->
  <g transform="translate(174 24) scale(0.722)">
    <g filter="url(#oh)" opacity=".5">
      <circle cx="24" cy="30" r="14" fill="#6366f1"/>
      <circle cx="48" cy="30" r="14" fill="#ec4899"/>
      <circle cx="36" cy="50" r="14" fill="#38bdf8"/>
    </g>
    <circle cx="36" cy="36" r="26" fill="#0b0b14"/>
    <g clip-path="url(#oc)">
      <g filter="url(#ob)">
        <circle cx="24" cy="24" r="18" fill="#6366f1"/>
        <circle cx="48" cy="28" r="17" fill="#ec4899"/>
        <circle cx="32" cy="52" r="18" fill="#38bdf8"/>
      </g>
      <circle cx="36" cy="36" r="26" fill="url(#oin)"/>
    </g>
    <circle cx="36" cy="36" r="26" fill="url(#os)"/>
    <circle cx="36" cy="36" r="26" fill="none" stroke="url(#orim)" stroke-width="1.3"/>
    <ellipse cx="27" cy="22" rx="7" ry="3" fill="#fff" opacity=".45" transform="rotate(-30 27 22)"/>
    <ellipse cx="36" cy="36" rx="32" ry="13" fill="none" stroke="#fff" stroke-opacity=".3" stroke-width="1.2" stroke-dasharray="2 3.5" transform="rotate(-30 36 36)"/>
    <g transform="translate(36 36) rotate(-30) scale(1 0.406)">
      <g transform="rotate(110)">
        <circle cx="0" cy="-32" r="7" fill="#fff" opacity=".25"/>
        <circle cx="0" cy="-32" r="3.6" fill="url(#op)"/>
        <circle cx="0" cy="-32" r="1.6" fill="#fff"/>
      </g>
    </g>
  </g>

  <!-- "des" — starts at x=232 -->
  <text x="232" y="70"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="60" font-weight="800" letter-spacing="-3.2" fill="url(#text)">des</text>
</svg>
